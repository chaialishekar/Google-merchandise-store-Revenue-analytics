<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Google Merchandise Store â€” The Story</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Patrick+Hand&family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FCFCF8; --ink:#26282B; --muted:#6b7278;
    --blue:#4285F4; --red:#EA4335; --yellow:#FBBC05; --green:#34A853;
    --track:#E7E7E2; --lost:#B9BEC2;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; font-family:'Patrick Hand',cursive; color:var(--ink);
    background:var(--paper);
    display:flex; align-items:center; justify-content:center; flex-direction:column;
    padding:28px 16px;
  }

  .story{
    width:100%; max-width:430px; background:#fff; border-radius:18px;
    box-shadow:0 8px 32px rgba(38,40,43,0.14); overflow:hidden; position:relative;
    border:2px solid #EDEDE7;
  }

  .progress-row{ display:flex; gap:4px; padding:14px 14px 0; }
  .seg{ flex:1; height:4px; border-radius:2px; background:var(--track); cursor:pointer; overflow:hidden; position:relative; }
  .seg .fill{ position:absolute; inset:0; transform:scaleX(0); transform-origin:left; }
  .seg.done .fill{ transform:scaleX(1); }
  .seg.current .fill{ transform:scaleX(1); }

  .scene{
    padding:22px 24px 22px; min-height:340px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;
  }

  .icon-wrap{ margin-bottom:6px; transition:color .3s ease; }
  .icon-wrap svg{ width:190px; height:140px; overflow:visible; }
  path.draw{ fill:none; stroke:currentColor; stroke-width:3.4; stroke-linecap:round; stroke-linejoin:round; }

  .kicker{ font-family:'Inter'; font-weight:700; font-size:11px; letter-spacing:2px; text-transform:uppercase; margin-bottom:6px; transition:color .3s ease; }
  .title{ font-family:'Permanent Marker',cursive; font-weight:400; font-size:23px; margin:2px 0 8px; line-height:1.25; text-transform:uppercase; }
  .caption{ font-size:17px; color:var(--muted); line-height:1.4; max-width:320px; font-family:'Patrick Hand',cursive; }

  .stat-pill{
    font-family:'Inter'; font-weight:700; font-size:12.5px; padding:6px 15px; border-radius:999px;
    margin-top:10px; display:inline-block; color:#fff; letter-spacing:0.3px;
  }

  .crowd-row{ display:flex; gap:10px; justify-content:center; margin-bottom:6px; }
  .crowd-fig{ transition:opacity .5s ease, transform .5s ease; opacity:0; transform:translateY(6px); }
  .crowd-fig.show{ opacity:1; transform:translateY(0); }
  .crowd-fig.out{ opacity:0.28; }
  .crowd-fig svg{ width:30px; height:40px; }
  .crowd-fig path{ stroke:var(--green); fill:none; stroke-width:3; stroke-linecap:round; stroke-linejoin:round; }
  .crowd-fig.out path{ stroke:var(--lost); }

  .nav{ display:flex; align-items:center; justify-content:space-between; padding:0 20px 20px; }
  .nav button{
    background:var(--track); border:none; width:36px; height:36px; border-radius:50%; cursor:pointer;
    font-size:15px; color:var(--ink); display:flex; align-items:center; justify-content:center;
  }
  .nav button:hover{ background:#DCDCD4; }
  .nav .replay{
    background:var(--ink); color:#fff; width:auto; border-radius:999px; padding:0 16px;
    font-family:'Inter'; font-weight:600; font-size:12.5px;
  }

  .footnote{ font-size:12px; color:#9aa0a4; margin-top:16px; text-align:center; max-width:400px; line-height:1.5; font-family:'Inter'; }
</style>
</head>
<body>

  <div class="story">
    <div class="progress-row" id="progress-row"></div>
    <div class="scene" id="scene"></div>
    <div class="nav">
      <button onclick="go(current-1, true)" aria-label="Previous">&#8592;</button>
      <button class="replay" onclick="restart()">Replay</button>
      <button onclick="go(current+1, true)" aria-label="Next">&#8594;</button>
    </div>
  </div>
  <p class="footnote">Based on the Google Merchandise Store GA4 revenue &amp; funnel analysis â€” every number shown is from the underlying data.</p>

<script>
function bagPaths(x, y){
  const body = `M${x-7},${y-6} L${x+7},${y-6} L${x+6},${y+14} L${x-6},${y+14} Z`;
  const handle = `M${x-5},${y-6} Q${x},${y-16} ${x+5},${y-6}`;
  return [body, handle];
}
function bagSVG(x, y, drawable){
  const cls = drawable ? 'draw' : '';
  return bagPaths(x,y).map(d => `<path class="${cls}" d="${d}"/>`).join('');
}
function checkPath(x, y){
  return `<path d="M${x-6},${y} L${x-1},${y+5} L${x+7},${y-8}" />`;
}

const scenes = [
  { kicker:'', title:'Welcome to the Google Merchandise Store', caption:'A customer begins a journey toward making a purchase.',
    color:'var(--blue)',
    svg: () => `<svg viewBox="0 0 200 160">
      <path class="draw" d="M75,68 L125,68 L118,138 L82,138 Z"/>
      <path class="draw" d="M85,68 Q100,40 115,68"/>
    </svg>` },

  { kicker:'The Journey', title:'Every Customer Starts the Climb', caption:'Each session enters the purchase funnel with the same goal.',
    color:'var(--blue)',
    svg: () => `<svg viewBox="0 0 200 160">
      <path class="draw" d="M40,42 L160,42 L160,122 L40,122 Z"/>
      <path class="draw" d="M40,60 L160,60"/>
      <path class="draw" d="M50,51 a3,3 0 1,0 0.1,0"/>
      <path class="draw" d="M61,51 a3,3 0 1,0 0.1,0"/>
      <path class="draw" d="M72,51 a3,3 0 1,0 0.1,0"/>
      <path class="draw" d="M62,92 L90,72 L112,88 L150,58"/>
    </svg>` },

  { kicker:'The Journey', title:'Something Blocks the Journey', caption:'Many customers leave before reaching checkout.',
    color:'var(--red)',
    svg: () => `<svg viewBox="0 0 200 160">
      <path class="draw" d="M55,75 L145,75 L132,115 L68,115 Z"/>
      <path class="draw" d="M55,75 L38,58"/>
      <path class="draw" d="M75,124 a6,6 0 1,0 0.1,0"/>
      <path class="draw" d="M125,124 a6,6 0 1,0 0.1,0"/>
      <path class="draw" d="M100,32 L86,58 L114,58 Z"/>
      <path class="draw" d="M100,41 L100,49"/>
      <path class="draw" d="M100,53 a1.6,1.6 0 1,0 0.1,0"/>
    </svg>` },

  { kicker:'The Investigation', title:'Finding the Root Cause', caption:'267,116 sessions analyzed using SQL and statistical methods.',
    color:'var(--yellow)',
    svg: () => `<svg viewBox="0 0 200 160">
      <path class="draw" d="M40,135 L40,60"/>
      <path class="draw" d="M40,135 L165,135"/>
      <path class="draw" d="M60,135 L60,95"/>
      <path class="draw" d="M90,135 L90,75"/>
      <path class="draw" d="M120,135 L120,105"/>
      <path class="draw" d="M150,135 L150,85"/>
    </svg>` },

  { kicker:'The Fix', title:'A Product Solution Removes the Friction', caption:'A behavioral discovery assistant guides customers through the hardest step.',
    color:'var(--green)',
    svg: () => `<svg viewBox="0 0 200 160">
      <path class="draw" d="M50,48 L150,48 L150,98 L95,98 L80,118 L80,98 L50,98 Z"/>
      <path class="draw" d="M100,63 L100,83"/>
      <path class="draw" d="M90,73 L110,73"/>
    </svg>` },

  { kicker:'The Result', title:'More Customers Complete the Journey', caption:'Projected conversion increases from 1.52% to 1.86%.',
    type:'crowd', fail:false, color:'var(--green)' },

  { kicker:'The Result', title:'Revenue Grows', caption:'Projected quarterly revenue uplift of approximately $80K.',
    color:'var(--green)',
    svg: () => `<svg viewBox="0 0 200 160">
      <text x="100" y="105" text-anchor="middle" font-family="'Permanent Marker'" font-size="64" fill="currentColor">$</text>
      <path class="draw" d="M140,120 L160,80 L152,90 M160,80 L168,96"/>
    </svg>` },
];

let current = 0;
let timer = null;
let userControlled = false;
const AUTOPLAY_MS = 3800;

function buildCrowd(failMode){
  const total = 7;
  const survive = failMode ? 2 : 6;
  let html = '<div class="crowd-row">';
  for(let i=0;i<total;i++){
    const isSurvivor = i < survive;
    const cls = isSurvivor ? '' : 'out';
    const check = (!failMode && isSurvivor) ? checkPath(25, 8) : '';
    html += `<div class="crowd-fig ${cls}"><svg viewBox="0 0 40 50">${bagSVG(20,28,false)}${check}</svg></div>`;
  }
  html += '</div>';
  return html;
}

function drawOn(container){
  const paths = container.querySelectorAll('path.draw');
  paths.forEach((p, i) => {
    try{
      const len = p.getTotalLength();
      p.style.strokeDasharray = len;
      p.style.strokeDashoffset = len;
      p.getBoundingClientRect();
      p.style.transition = 'stroke-dashoffset 0.7s ease ' + (i*0.12) + 's';
      requestAnimationFrame(()=>{ p.style.strokeDashoffset = '0'; });
    } catch(e){ /* ignore elements that can't compute length */ }
  });
}

function render(){
  const s = scenes[current];
  const sceneEl = document.getElementById('scene');
  let inner = '';
  if(s.kicker) inner += `<div class="kicker" style="color:${s.color}">${s.kicker}</div>`;

  if(s.type === 'crowd'){
    inner += buildCrowd(s.fail);
  } else {
    inner += `<div class="icon-wrap" style="color:${s.color}">${s.svg()}</div>`;
  }

  inner += `<div class="title">${s.title}</div>`;
  inner += `<div class="caption">${s.caption}</div>`;

  if(current === scenes.length - 1){
    inner += `<div class="stat-pill" style="background:${s.color}">CONFIRMED IN THE DATA</div>`;
  }

  sceneEl.innerHTML = inner;

  if(s.type === 'crowd'){
    requestAnimationFrame(()=>{
      const figs = sceneEl.querySelectorAll('.crowd-fig');
      figs.forEach((f,i)=> setTimeout(()=> f.classList.add('show'), i*80));
    });
  } else {
    const svgEl = sceneEl.querySelector('svg');
    if(svgEl) drawOn(svgEl);
  }

  renderProgress();
}

function renderProgress(){
  const row = document.getElementById('progress-row');
  row.innerHTML = '';
  scenes.forEach((s, i) => {
    const seg = document.createElement('div');
    seg.className = 'seg' + (i < current ? ' done' : '') + (i === current ? ' current' : '');
    seg.innerHTML = `<div class="fill" style="background:${s.color}"></div>`;
    seg.onclick = () => go(i, true);
    row.appendChild(seg);
  });
}

function go(i, byUser){
  current = (i + scenes.length) % scenes.length;
  render();
  if(byUser){
    userControlled = true;
    clearInterval(timer);
  }
}

function restart(){
  userControlled = false;
  current = 0;
  render();
  clearInterval(timer);
  startAutoplay();
}

function startAutoplay(){
  timer = setInterval(() => {
    if(userControlled) return;
    current = (current + 1) % scenes.length;
    render();
  }, AUTOPLAY_MS);
}

render();
startAutoplay();
</script>
</body>
</html>
